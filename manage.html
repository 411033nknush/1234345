<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理單字</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">單字管理</p>
          <h1>新增與整理詞庫</h1>
        </div>
        <nav class="nav-links">
          <a href="index.html">背單字</a>
          <a href="manage.html" class="active">管理單字</a>
        </nav>
      </header>

      <main class="manage-grid">
        <section class="panel form-panel">
          <p class="eyebrow">新增單字</p>
          <h2>輸入英文單字後，點擊自動填入</h2>
          <p class="lede">系統會呼叫公開 API 取得翻譯、詞性、例句與字根分析，節省手動查詢時間。</p>

          <form id="wordForm" class="word-form">
            <label>
              英文單字
              <input id="englishWord" name="english" type="text" placeholder="例如：confidence" required />
            </label>
            <label>
              中文翻譯
              <input id="translation" name="translation" type="text" placeholder="自動填入或手動輸入" required />
            </label>
            <label>
              詞性
              <input id="partOfSpeech" name="partOfSpeech" type="text" placeholder="例如：noun / verb" />
            </label>
            <label>
              例句
              <textarea id="exampleSentence" name="exampleSentence" rows="3" placeholder="可直接貼上例句"></textarea>
            </label>
            <label>
              字根分析
              <textarea id="rootAnalysis" name="rootAnalysis" rows="3" placeholder="可補充字根、詞綴說明"></textarea>
            </label>
            <div class="form-actions">
              <button id="autoFillBtn" class="primary-btn" type="button">自動填入</button>
              <button class="ghost-btn" type="submit">加入詞庫</button>
            </div>
          </form>
          <p id="statusMessage" class="status-message" aria-live="polite"></p>
        </section>

        <section class="panel list-panel">
          <div class="study-header">
            <div>
              <p class="eyebrow">已儲存單字</p>
              <h3>詞庫清單</h3>
            </div>
            <button id="clearBtn" class="ghost-btn" type="button">清空詞庫</button>
          </div>
          <ul id="wordList" class="word-list"></ul>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
